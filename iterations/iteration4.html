<!DOCTYPE html>
<html lang="en">
<head>
	<!-- Metadata information--don't edit! -->
	<meta charset="utf-8">
	<meta content="initial-scale=1.0,width=device-width" name="viewport">
	<meta name="lyricist" content="Bob Dylan">
    <meta name="vocalist" content="Marcus Mumford">
    <meta name="project-source" content="The New Basement Tapes">
    <meta name="song-title" content="When I Get My Hands On You">
    <meta name="description" content="An interactive lyric visualization of Bob Dylan's 'When I Get My Hands On You' featuring vocals by Marcus Mumford.">
	<!-- Add your website title here -->
	<title>Iteration 4</title> 

	<!-- Googlefonts linking setup -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
	
	<!-- JQuery link setup--uncomment below to setup JQuery-->
	<!-- <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script> -->
	
	<!-- JS document link setup--uncomment below to link your .js file -->
	<!-- <script src="js/scripts.js"></script> -->

	<style>
		/* Your CSS styling FOR THIS PAGE here */

		/*Place line in middle of screen*/
		.line {
			position: absolute;
			top: 50%;
			left: 35%;
			color: rgb(0, 0, 0);
			font-size: 2.5rem;
			font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
		}
		img{
			width: 200px;
			height: auto;
		}
		.back-link {
			position: fixed;
			bottom: 30px;
			left: 30px;
			background: none;
			border: none;
			font-family: 'Silkscreen', cursive; /* Using your pixel font */
			font-size: 1rem;
			color: #707070;
			cursor: pointer;
			text-transform: lowercase;
			letter-spacing: 1px;
			z-index: 1000;
		}

		.back-link:hover {
			text-decoration: line-through; /* A very 'indie' non-conformist hover state */
			color: #ff3e3e;
		}

		.back-link::before {
			content: "[ ";
		}

		.back-link::after {
			content: " ]";
		}

		/*JS will shift the eye to random positions on the screen. Goal is to track and click eye*/
	</style>
	
</head>

<body>
	<button class="back-link" onclick="history.back()">Go Back</button>

	<!-- Your HTML here -->

	<div class="eye">
		<img src="https://marketplace.canva.com/o1ocY/MAG902o1ocY/1/tl/canva-simple-hand-drawn-eye-illustration-MAG902o1ocY.png" alt="Drawing of eye">
		<div class="line">When I set my eyes on you</div>
		
	
</body>

</html>
